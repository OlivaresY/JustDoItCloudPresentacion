<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Tareas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>Reporte de tareas del usuario</h1>
        <!-- Reutilizacion del fragmento-->
        <div th:replace="~{fragments/user-info :: userInfo}"></div>

        <div class="report-table-container" style="margin-top: 20px;">
            <table class="task-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background-color: #f4f4f4;">
                        <th style="padding: 10px; border: 1px solid #ddd;">Tarea</th>
                        <th style="padding: 10px; border: 1px solid #ddd;">Estado</th>
                        <th style="padding: 10px; border: 1px solid #ddd;">Fecha límite</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Recorremos todas las tareas en formato tabla -->
                    <tr th:each="task : ${tasks}">
                        <td th:text="${task.title}" style="padding: 10px; border: 1px solid #ddd;">Tarea</td>
                        <td th:text="${task.status}" style="padding: 10px; border: 1px solid #ddd;">Estado</td>
                        <td th:text="${task.dueDate != null ? task.dueDate : 'No especificada'}"
                            style="padding: 10px; border: 1px solid #ddd;">Fecha</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
